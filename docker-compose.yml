services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    mem_limit: 2g
    cpus: "1.5"

  ui:
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile
    env_file: .env
    ports:
      - "8501:8501"
    restart: unless-stopped
    mem_limit: 2g
    cpus: "1.5"